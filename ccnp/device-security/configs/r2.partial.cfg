! =====================================================================
!  R2  |  Routing peer -- gives CoPP real OSPF/BGP control-plane traffic
!  to police, and a second device to manage. Minimal config only. See README.
! =====================================================================
hostname r2
!
ip cef
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
! ---- Management LAN (to SW1) ----
interface Ethernet0/1
 description ## management LAN -> SW1 ##
 ip address 10.0.0.2 255.255.255.0
 no shutdown
!
end
