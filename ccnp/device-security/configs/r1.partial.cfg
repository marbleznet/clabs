! =====================================================================
!  R1  |  Device under test -- management + control plane security
!  Minimal config only: interface + IP. NO SSH, NO AAA, NO CoPP, NO
!  routing -- you build every security concept by hand. See README.
! =====================================================================
hostname r1
!
ip cef
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
! ---- Management LAN (to SW1: R2, RADIUS, TACACS+, admin) ----
interface Ethernet0/1
 description ## management LAN -> SW1 ##
 ip address 10.0.0.1 255.255.255.0
 no shutdown
!
end
