# FreeRADIUS clients (NAS devices allowed to send Access-Requests).
# One entry per subnet is simplest for a lab: any router on the mgmt LAN may
# authenticate, using this shared secret. The SAME secret must be typed on the
# router: `radius server ... key CISCO123`.

client mgmt-lan {
    ipaddr = 10.0.0.0/24
    secret = CISCO123
    nastype = cisco
}
