# Shrubbery-style tac_plus configuration (standard tac_plus.conf format).
# The shared secret must match the router: `tacacs server ... key CISCO123`.
#
# TACACS+ separates Authentication / Authorization / Accounting, so unlike the
# RADIUS user we can express PER-COMMAND authorization here -- the headline
# TACACS+ feature.

key = CISCO123

# Full-access admin (privilege 15, all commands).
user = tacadmin {
    login = cleartext tacpass
    service = exec {
        priv-lvl = 15
    }
    cmd = show      { permit .* }
    cmd = configure { permit .* }
    cmd = interface { permit .* }
}

# Read-only operator: may run "show ..." and nothing else -- demonstrates
# TACACS+ command authorization denying config.
user = tacoper {
    login = cleartext operpass
    service = exec {
        priv-lvl = 15
    }
    cmd = show      { permit .* }
    cmd = enable    { permit .* }
    cmd = exit      { permit .* }
    # everything else is implicitly denied
}
