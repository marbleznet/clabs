! =====================================================================
!  R4  |  AS 65200  |  ISP-A
!  eBGP to R2 (enterprise 65100) and R5 (ISP-B 65300).
!  Originates: 198.51.100.0/24 (ISP-A only) and 203.0.113.0/24 (shared).
!  Tags the shared prefix with community 65200:100 toward the enterprise.
! =====================================================================
hostname r4
!
ip cef
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
!
interface Ethernet0/1
 description ## eBGP to R2 (Enterprise / AS65100) ##
 ip address 100.64.24.2 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description ## eBGP to R5 (ISP-B / AS65300) ##
 ip address 100.64.45.1 255.255.255.252
 no shutdown
!
! ---- "Internet" destinations originated by ISP-A ----
ip route 198.51.100.0 255.255.255.0 Null0
ip route 203.0.113.0 255.255.255.0 Null0
!
router bgp 65200
 bgp router-id 4.4.4.4
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 100.64.24.1 remote-as 65100
 neighbor 100.64.45.2 remote-as 65300
 address-family ipv4
  network 198.51.100.0 mask 255.255.255.0
  network 203.0.113.0 mask 255.255.255.0
  neighbor 100.64.24.1 activate
  neighbor 100.64.24.1 send-community
  neighbor 100.64.24.1 route-map TO-ENT out
  neighbor 100.64.45.2 activate
 exit-address-family
!
ip prefix-list SHARED seq 5 permit 203.0.113.0/24
!
route-map TO-ENT permit 10
 match ip address prefix-list SHARED
 set community 65200:100
route-map TO-ENT permit 20
!
end
