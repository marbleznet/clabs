! =====================================================================
!  R2  |  AS 65100  |  Enterprise EDGE -> ISP-A (R4, AS 65200)
!  Roles: OSPF area 0, iBGP client of RR (R1), eBGP to ISP-A.
!  Policy: prefer ISP-A for OUTBOUND traffic via LOCAL_PREF (inbound RM).
! =====================================================================
hostname r2
!
ip cef
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
 ip ospf 1 area 0
!
! ---- Simulated enterprise LAN advertised into BGP ----
interface Loopback1
 description ## Enterprise LAN (advertised via BGP) ##
 ip address 172.16.2.1 255.255.255.0
!
! ---- Core links (OSPF area 0) ----
interface Ethernet0/1
 description ## to R1 ##
 ip address 10.1.12.2 255.255.255.0
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/2
 description ## to R3 ##
 ip address 10.1.23.2 255.255.255.0
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
! ---- eBGP link to ISP-A (NOT in OSPF -> next-hop-self needed on iBGP) ----
interface Ethernet0/3
 description ## eBGP to R4 (ISP-A / AS65200) ##
 ip address 100.64.24.1 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
 passive-interface Loopback0
!
router bgp 65100
 bgp router-id 2.2.2.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 ! --- iBGP to Route Reflector ---
 neighbor 1.1.1.1 remote-as 65100
 neighbor 1.1.1.1 update-source Loopback0
 ! --- eBGP to ISP-A ---
 neighbor 100.64.24.2 remote-as 65200
 address-family ipv4
  network 172.16.2.0 mask 255.255.255.0
  neighbor 1.1.1.1 activate
  neighbor 1.1.1.1 next-hop-self
  neighbor 1.1.1.1 send-community
  neighbor 100.64.24.2 activate
  neighbor 100.64.24.2 send-community
  neighbor 100.64.24.2 route-map ISP-A-IN in
 exit-address-family
!
! LOCAL_PREF 200 on everything learned from ISP-A -> enterprise egresses via R2.
route-map ISP-A-IN permit 10
 set local-preference 200
!
end
