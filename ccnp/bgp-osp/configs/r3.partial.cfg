! =====================================================================
!  R3  |  AS 65100  |  Enterprise EDGE -> ISP-B (R5, AS 65300)
!  Roles: OSPF area 0, iBGP client of RR (R1), eBGP to ISP-B.
!  Policy: AS-PATH PREPEND outbound to ISP-B so INBOUND traffic to the
!          enterprise prefers the ISP-A path (via R2). ISP-B = backup.
! =====================================================================
hostname r3
!
ip cef
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
 ip ospf 1 area 0
!
interface Loopback1
 description ## Enterprise LAN (advertised via BGP) ##
 ip address 172.16.3.1 255.255.255.0
!
interface Ethernet0/1
 description ## to R1 ##
 ip address 10.1.13.3 255.255.255.0
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/2
 description ## to R2 ##
 ip address 10.1.23.3 255.255.255.0
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/3
 description ## eBGP to R5 (ISP-B / AS65300) ##
 ip address 100.64.35.1 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 3.3.3.3
 passive-interface Loopback0
!
router bgp 65100
 bgp router-id 3.3.3.3
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 ! --- iBGP to Route Reflector ---
 neighbor 1.1.1.1 remote-as 65100
 neighbor 1.1.1.1 update-source Loopback0
 ! --- eBGP to ISP-B ---
 neighbor 100.64.35.2 remote-as 65300
 address-family ipv4
  network 172.16.3.0 mask 255.255.255.0
  neighbor 1.1.1.1 activate
  neighbor 1.1.1.1 next-hop-self
  neighbor 1.1.1.1 send-community
  neighbor 100.64.35.2 activate
  neighbor 100.64.35.2 send-community
  neighbor 100.64.35.2 route-map ISP-B-OUT out
 exit-address-family
!
! Prepend our ASN 3x on advertisements to ISP-B -> makes the enterprise
! look "farther" via ISP-B, steering INBOUND traffic to ISP-A.
route-map ISP-B-OUT permit 10
 set as-path prepend 65100 65100 65100
!
end
