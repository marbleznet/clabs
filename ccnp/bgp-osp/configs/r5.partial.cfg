! =====================================================================
!  R5  |  AS 65300  |  ISP-B
!  eBGP to R3 (enterprise 65100) and R4 (ISP-A 65200).
!  Originates: 192.0.2.0/24 (ISP-B only) and 203.0.113.0/24 (shared).
! =====================================================================
hostname r5
!
ip cef
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
!
interface Ethernet0/1
 description ## eBGP to R3 (Enterprise / AS65100) ##
 ip address 100.64.35.2 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description ## eBGP to R4 (ISP-A / AS65200) ##
 ip address 100.64.45.2 255.255.255.252
 no shutdown
!
! ---- "Internet" destinations originated by ISP-B ----
ip route 192.0.2.0 255.255.255.0 Null0
ip route 203.0.113.0 255.255.255.0 Null0
!
router bgp 65300
 bgp router-id 5.5.5.5
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 100.64.35.1 remote-as 65100
 neighbor 100.64.45.1 remote-as 65200
 address-family ipv4
  network 192.0.2.0 mask 255.255.255.0
  network 203.0.113.0 mask 255.255.255.0
  neighbor 100.64.35.1 activate
  neighbor 100.64.35.1 send-community
  neighbor 100.64.45.1 activate
 exit-address-family
!
end
