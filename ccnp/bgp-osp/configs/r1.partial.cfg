! =====================================================================
!  R1  |  AS 65100  |  Enterprise CORE + iBGP ROUTE REFLECTOR
!  Roles: OSPF area 0 backbone, RR for R2/R3, originates 172.16.0.0/16
! =====================================================================
hostname r1
!
ip cef
!
! ---- Loopback (Router-ID + iBGP peering source) ----
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
 ip ospf 1 area 0
!
! ---- Core links (OSPF area 0) ----
interface Ethernet0/1
 description ## to R2 ##
 ip address 10.1.12.1 255.255.255.0
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/2
 description ## to R3 ##
 ip address 10.1.13.1 255.255.255.0
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
! ---- IGP ----
router ospf 1
 router-id 1.1.1.1
 passive-interface Loopback0
!
! ---- Enterprise aggregate advertised to the Internet ----
ip route 172.16.0.0 255.255.0.0 Null0
!
! ---- BGP: pure iBGP Route Reflector (no eBGP on the core) ----
router bgp 65100
 bgp router-id 1.1.1.1
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 2.2.2.2 remote-as 65100
 neighbor 2.2.2.2 update-source Loopback0
 neighbor 3.3.3.3 remote-as 65100
 neighbor 3.3.3.3 update-source Loopback0
 address-family ipv4
  network 172.16.0.0 mask 255.255.0.0
  neighbor 2.2.2.2 activate
  neighbor 2.2.2.2 route-reflector-client
  neighbor 2.2.2.2 send-community
  neighbor 3.3.3.3 activate
  neighbor 3.3.3.3 route-reflector-client
  neighbor 3.3.3.3 send-community
 exit-address-family
!
end
