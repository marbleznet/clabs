# =============================================================================
#  CCNP BGP Study Lab  (OSPF as IGP + BGP)
# =============================================================================
#
#  AS 65100  "ENTERPRISE"  -> R1 (core / route-reflector), R2 & R3 (edge)
#                             IGP = OSPF area 0, iBGP via loopbacks (RR design)
#  AS 65200  "ISP-A"       -> R4  (upstream provider)
#  AS 65300  "ISP-B"       -> R5  (upstream provider)
#
#  eBGP:  R2<->R4 (65100-65200),  R3<->R5 (65100-65300),  R4<->R5 (65200-65300)
#
#  Concepts covered: eBGP vs iBGP, loopback peering + next-hop-self,
#  route reflector, network/aggregate origination, LOCAL_PREF (outbound TE),
#  AS-PATH prepend (inbound TE), communities, and OSPF-fed iBGP reachability.
#
#  Interface map (containerlab ethX -> IOL Ethernet0/X, E0/0 = mgmt):
#    eth1 -> Ethernet0/1   eth2 -> Ethernet0/2   eth3 -> Ethernet0/3
# =============================================================================
name: bgp-ospf-lab

topology:
  defaults:
    kind: cisco_iol
    image: vrnetlab/cisco_iol:17.16.01

  nodes:
    r1:                                   # Enterprise core + Route Reflector
      startup-config: configs/r1.partial.cfg
    r2:                                   # Enterprise edge -> ISP-A
      startup-config: configs/r2.partial.cfg
    r3:                                   # Enterprise edge -> ISP-B
      startup-config: configs/r3.partial.cfg
    r4:                                   # ISP-A  (AS 65200)
      startup-config: configs/r4.partial.cfg
    r5:                                   # ISP-B  (AS 65300)
      startup-config: configs/r5.partial.cfg

  links:
    # ---- Enterprise core (AS 65100, OSPF area 0) ----
    - endpoints: ["r1:eth1", "r2:eth1"]   # 10.1.12.0/24
    - endpoints: ["r1:eth2", "r3:eth1"]   # 10.1.13.0/24
    - endpoints: ["r2:eth2", "r3:eth2"]   # 10.1.23.0/24  (IGP redundancy)
    # ---- eBGP edges ----
    - endpoints: ["r2:eth3", "r4:eth1"]   # 100.64.24.0/30  65100 <-> 65200
    - endpoints: ["r3:eth3", "r5:eth1"]   # 100.64.35.0/30  65100 <-> 65300
    # ---- ISP-to-ISP transit ----
    - endpoints: ["r4:eth2", "r5:eth2"]   # 100.64.45.0/30  65200 <-> 65300
