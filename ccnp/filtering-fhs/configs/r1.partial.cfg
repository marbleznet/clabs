! =====================================================================
!  R1  |  Gateway router -- ACLs (v4/v6), uRPF, IPv6 traffic filter.
!  Routes the LAN (10.0.0.0/24, 2001:db8:a::/64) to the external segment
!  (203.0.113.0/24, 2001:db8:e::/64). Minimal config only: interfaces + IPs
!  + IPv6 routing on so it can send RAs and route v6. NO ACLs / uRPF / FHS
!  -- you build every filter by hand. See README.
! =====================================================================
hostname r1
!
ip cef
ipv6 unicast-routing
ipv6 cef
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
! ---- LAN side (to SW1: pc1, rogue) -- default gateway + RA source ----
interface Ethernet0/1
 description ## LAN -> SW1 ##
 ip address 10.0.0.1 255.255.255.0
 ipv6 address 2001:DB8:A::1/64
 no shutdown
!
! ---- External side (to ext host/server) ----
interface Ethernet0/2
 description ## external segment -> ext ##
 ip address 203.0.113.1 255.255.255.0
 ipv6 address 2001:DB8:E::1/64
 no shutdown
!
end
