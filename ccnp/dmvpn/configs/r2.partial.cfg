! =====================================================================
!  R2  |  DMVPN SPOKE. Lo1 = LAN behind the spoke.
!  Minimal config only: physical interface + public IP + loopbacks. NO
!  Tunnel, NO NHRP, NO routing, NO IPsec -- you build it. See README.
! =====================================================================
hostname r2
!
ip cef
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
! ---- LAN behind the spoke (advertise over DMVPN) ----
interface Loopback1
 description ## spoke LAN ##
 ip address 192.168.2.1 255.255.255.0
!
! ---- Public / NBMA interface (to the ISP underlay) ----
interface Ethernet0/1
 description ## public -> ISP ##
 ip address 203.0.12.1 255.255.255.252
 no shutdown
!
end
