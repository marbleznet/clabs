! =====================================================================
!  R1  |  DMVPN HUB (NHRP Next Hop Server). Lo1 = LAN behind the hub.
!  Minimal config only: physical interface + public IP + loopbacks. NO
!  Tunnel, NO NHRP, NO routing, NO IPsec -- you build the whole DMVPN
!  overlay by hand. See README.
! =====================================================================
hostname r1
!
ip cef
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
! ---- LAN behind the hub (advertise over DMVPN) ----
interface Loopback1
 description ## hub LAN ##
 ip address 192.168.1.1 255.255.255.0
!
! ---- Public / NBMA interface (to the ISP underlay) ----
interface Ethernet0/1
 description ## public -> ISP ##
 ip address 203.0.11.1 255.255.255.252
 no shutdown
!
end
