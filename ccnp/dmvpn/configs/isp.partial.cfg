! =====================================================================
!  ISP  |  Underlay "internet" -- FIXTURE, you don't touch it.
!  Directly connected to the hub and both spokes' public /30s; its
!  connected routes let every public address reach every other. No
!  routing protocol needed. (Analogous to SW1 in the other labs.)
! =====================================================================
hostname isp
!
ip cef
!
! ---- To hub R1 ----
interface Ethernet0/1
 description ## underlay -> R1 (hub) ##
 ip address 203.0.11.2 255.255.255.252
 no shutdown
!
! ---- To spoke R2 ----
interface Ethernet0/2
 description ## underlay -> R2 (spoke) ##
 ip address 203.0.12.2 255.255.255.252
 no shutdown
!
! ---- To spoke R3 ----
interface Ethernet0/3
 description ## underlay -> R3 (spoke) ##
 ip address 203.0.13.2 255.255.255.252
 no shutdown
!
end
