! =====================================================================
!  R2  |  Area 0 backbone + future ABR into Area 2
!  Minimal config only: interfaces + IPs. NO OSPF -- you add that.
! =====================================================================
hostname r2
!
ip cef
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
! ---- Area 0 broadcast LAN (to SW1, shared with R1 & R3) ----
interface Ethernet0/1
 description ## Area 0 LAN -> SW1 ##
 ip address 10.0.0.2 255.255.255.0
 ipv6 address 2001:DB8:0::2/64
 no shutdown
!
! ---- Point-to-point into Area 2 (to R5) ----
interface Ethernet0/2
 description ## Area 2 p2p -> R5 ##
 ip address 10.0.25.1 255.255.255.252
 ipv6 address 2001:DB8:25::2/64
 no shutdown
!
end
