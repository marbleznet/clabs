! =====================================================================
!  R1  |  Area 0 backbone + future ABR into Area 1
!  Minimal config only: interfaces + IPs. NO OSPF -- you add that.
! =====================================================================
hostname r1
!
ip cef
!
! ---- Loopback0: stable Router-ID / management ----
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
! ---- Area 0 broadcast LAN (to SW1, shared with R2 & R3) ----
interface Ethernet0/1
 description ## Area 0 LAN -> SW1 ##
 ip address 10.0.0.1 255.255.255.0
 ipv6 address 2001:DB8:0::1/64
 no shutdown
!
! ---- Point-to-point into Area 1 (to R4) ----
interface Ethernet0/2
 description ## Area 1 p2p -> R4 ##
 ip address 10.0.14.1 255.255.255.252
 ipv6 address 2001:DB8:14::1/64
 no shutdown
!
end
