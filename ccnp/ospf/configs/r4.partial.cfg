! =====================================================================
!  R4  |  Area 1 internal router (behind ABR R1)
!  Minimal config only: interfaces + IPs. NO OSPF -- you add that.
! =====================================================================
hostname r4
!
ip cef
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
!
! ---- Area 1 internal LAN (advertise into OSPF) ----
interface Loopback1
 description ## Area 1 internal net ##
 ip address 172.16.40.1 255.255.255.0
 ipv6 address 2001:DB8:40::1/64
!
! ---- Point-to-point to ABR R1 ----
interface Ethernet0/1
 description ## Area 1 p2p -> R1 ##
 ip address 10.0.14.2 255.255.255.252
 ipv6 address 2001:DB8:14::4/64
 no shutdown
!
end
