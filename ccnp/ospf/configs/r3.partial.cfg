! =====================================================================
!  R3  |  Area 0 backbone + future ASBR (redistributes externals)
!  Minimal config only: interfaces + IPs. NO OSPF, NO redistribution.
!  Lo1 represents a "connected" external network you will redistribute.
!  (You will also add static routes in the guide to redistribute.)
! =====================================================================
hostname r3
!
ip cef
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
! ---- Simulated EXTERNAL network (NOT in OSPF; redistribute as connected) ----
interface Loopback1
 description ## External net -> redistribute into OSPF ##
 ip address 172.16.30.1 255.255.255.0
 ipv6 address 2001:DB8:30::1/64
!
! ---- Area 0 broadcast LAN (to SW1, shared with R1 & R2) ----
interface Ethernet0/1
 description ## Area 0 LAN -> SW1 ##
 ip address 10.0.0.3 255.255.255.0
 ipv6 address 2001:DB8:0::3/64
 no shutdown
!
end
