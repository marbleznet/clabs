! =====================================================================
!  R5  |  Area 2 internal router (behind ABR R2)
!  Minimal config only: interfaces + IPs. NO OSPF -- you add that.
! =====================================================================
hostname r5
!
ip cef
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
!
! ---- Area 2 internal LAN (advertise into OSPF) ----
interface Loopback1
 description ## Area 2 internal net ##
 ip address 172.16.50.1 255.255.255.0
 ipv6 address 2001:DB8:50::1/64
!
! ---- Point-to-point to ABR R2 ----
interface Ethernet0/1
 description ## Area 2 p2p -> R2 ##
 ip address 10.0.25.2 255.255.255.252
 ipv6 address 2001:DB8:25::5/64
 no shutdown
!
end
