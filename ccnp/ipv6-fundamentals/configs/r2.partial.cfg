! =====================================================================
!  R2  |  IPv6 fundamentals lab -- second LAN router (NS/NA + DAD peer)
!  BLANK IPv6 SLATE: interfaces UP, NO IPv6 addresses, IPv6 routing OFF.
!  You configure everything yourself. See README.
! =====================================================================
hostname r2
!
ip cef
!
! ---- Loopback: assign a global /64 as a ping target ----
interface Loopback0
 description ## suggested: 2001:DB8:ACAD:2::1/64 ##
!
! ---- Shared LAN -> SW1 (with R1 and R3) ----
interface Ethernet0/1
 description ## LAN -> SW1  (suggested 2001:DB8:ACAD:A::2/64) ##
 no shutdown
!
! ---- Point-to-point -> R1 ----
interface Ethernet0/2
 description ## p2p -> R1  (suggested 2001:DB8:ACAD:12::2/64) ##
 no shutdown
!
end
