! =====================================================================
!  R1  |  IPv6 fundamentals lab -- LAN router / default gateway / RA source
!  BLANK IPv6 SLATE: interfaces are UP but have NO IPv6 addresses and
!  IPv6 routing is OFF. You assign every IPv6 address and enable
!  'ipv6 unicast-routing' yourself -- that is the whole lab. See README.
! =====================================================================
hostname r1
!
ip cef
!
! ---- Loopback: assign a global /64 as a ping target ----
interface Loopback0
 description ## suggested: 2001:DB8:ACAD:1::1/64 ##
!
! ---- Shared LAN -> SW1 (with R2 and R3) ----
interface Ethernet0/1
 description ## LAN -> SW1  (suggested 2001:DB8:ACAD:A::1/64) ##
 no shutdown
!
! ---- Point-to-point -> R2 ----
interface Ethernet0/2
 description ## p2p -> R2  (suggested 2001:DB8:ACAD:12::1/64) ##
 no shutdown
!
end
