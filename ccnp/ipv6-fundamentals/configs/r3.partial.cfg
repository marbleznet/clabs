! =====================================================================
!  R3  |  IPv6 fundamentals lab -- the "HOST" (SLAAC client)
!  BLANK IPv6 SLATE: e0/1 is UP but has no IPv6 address. In the lab you
!  make it a SLAAC client ('ipv6 address autoconfig') and watch it build
!  its own address from R1's Router Advertisement. See README.
! =====================================================================
hostname r3
!
ip cef
!
! ---- Only link: shared LAN -> SW1 (acts as an endpoint/host) ----
interface Ethernet0/1
 description ## LAN -> SW1  (SLAAC client -- no static address) ##
 no shutdown
!
end
