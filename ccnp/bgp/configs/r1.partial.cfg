! =====================================================================
!  R1  |  AS 65001 border router -- eBGP to AS 65002 (R4); iBGP RR client
!  Minimal config only: interfaces + IPs. NO OSPF, NO BGP -- you add it all.
! =====================================================================
hostname r1
!
ip cef
!
! ---- Loopback0: BGP router-id + iBGP peering source (reached via OSPF) ----
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
! ---- AS 65001 core LAN (to SW1, shared with R2 & R3) ----
interface Ethernet0/1
 description ## AS65001 core LAN -> SW1 ##
 ip address 10.0.0.1 255.255.255.0
 ipv6 address 2001:DB8:0::1/64
 no shutdown
!
! ---- eBGP link to R4 (AS 65002) ----
interface Ethernet0/2
 description ## eBGP -> R4 (AS65002) ##
 ip address 10.14.0.1 255.255.255.252
 ipv6 address 2001:DB8:14::1/64
 no shutdown
!
end
