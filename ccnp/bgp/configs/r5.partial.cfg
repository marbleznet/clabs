! =====================================================================
!  R5  |  AS 65003 external peer -- eBGP to R2 (AS65001) and R4 (AS65002)
!  Originates the network 172.16.5.0/24 (Lo1) into BGP.
!  Minimal config only: interfaces + IPs. NO BGP -- you add it.
! =====================================================================
hostname r5
!
ip cef
!
! ---- Loopback0: BGP router-id ----
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
!
! ---- AS 65003 network advertised into BGP ----
interface Loopback1
 description ## AS65003 net -> advertise into BGP ##
 ip address 172.16.5.1 255.255.255.0
 ipv6 address 2001:DB8:5::1/64
!
! ---- eBGP link to R2 (AS 65001) ----
interface Ethernet0/1
 description ## eBGP -> R2 (AS65001) ##
 ip address 10.25.0.2 255.255.255.252
 ipv6 address 2001:DB8:25::2/64
 no shutdown
!
! ---- eBGP link to R4 (AS 65002) ----
interface Ethernet0/2
 description ## eBGP -> R4 (AS65002) ##
 ip address 10.45.0.2 255.255.255.252
 ipv6 address 2001:DB8:45::2/64
 no shutdown
!
end
