! =====================================================================
!  R2  |  AS 65001 border router -- eBGP to AS 65003 (R5); iBGP RR client
!  Minimal config only: interfaces + IPs. NO OSPF, NO BGP -- you add it all.
! =====================================================================
hostname r2
!
ip cef
!
! ---- Loopback0: BGP router-id + iBGP peering source (reached via OSPF) ----
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
! ---- AS 65001 core LAN (to SW1, shared with R1 & R3) ----
interface Ethernet0/1
 description ## AS65001 core LAN -> SW1 ##
 ip address 10.0.0.2 255.255.255.0
 ipv6 address 2001:DB8:0::2/64
 no shutdown
!
! ---- eBGP link to R5 (AS 65003) ----
interface Ethernet0/2
 description ## eBGP -> R5 (AS65003) ##
 ip address 10.25.0.1 255.255.255.252
 ipv6 address 2001:DB8:25::1/64
 no shutdown
!
end
