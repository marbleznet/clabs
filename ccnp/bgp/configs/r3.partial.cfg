! =====================================================================
!  R3  |  AS 65001 internal router -- future iBGP ROUTE REFLECTOR
!  Originates the internal network 172.16.3.0/24 (Lo1) into BGP.
!  Minimal config only: interfaces + IPs. NO OSPF, NO BGP -- you add it all.
! =====================================================================
hostname r3
!
ip cef
!
! ---- Loopback0: BGP router-id + iBGP peering source (reached via OSPF) ----
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
! ---- Internal network advertised into BGP (originated by AS 65001) ----
interface Loopback1
 description ## AS65001 internal net -> advertise into BGP ##
 ip address 172.16.3.1 255.255.255.0
 ipv6 address 2001:DB8:3::1/64
!
! ---- AS 65001 core LAN (to SW1, shared with R1 & R2) ----
interface Ethernet0/1
 description ## AS65001 core LAN -> SW1 ##
 ip address 10.0.0.3 255.255.255.0
 ipv6 address 2001:DB8:0::3/64
 no shutdown
!
end
