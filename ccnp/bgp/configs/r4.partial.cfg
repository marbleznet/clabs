! =====================================================================
!  R4  |  AS 65002 external peer -- eBGP to R1 (AS65001) and R5 (AS65003)
!  Originates the network 172.16.4.0/24 (Lo1) into BGP.
!  Minimal config only: interfaces + IPs. NO BGP -- you add it.
! =====================================================================
hostname r4
!
ip cef
!
! ---- Loopback0: BGP router-id ----
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
!
! ---- AS 65002 network advertised into BGP ----
interface Loopback1
 description ## AS65002 net -> advertise into BGP ##
 ip address 172.16.4.1 255.255.255.0
 ipv6 address 2001:DB8:4::1/64
!
! ---- eBGP link to R1 (AS 65001) ----
interface Ethernet0/1
 description ## eBGP -> R1 (AS65001) ##
 ip address 10.14.0.2 255.255.255.252
 ipv6 address 2001:DB8:14::2/64
 no shutdown
!
! ---- eBGP link to R5 (AS 65003) ----
interface Ethernet0/2
 description ## eBGP -> R5 (AS65003) ##
 ip address 10.45.0.1 255.255.255.252
 ipv6 address 2001:DB8:45::1/64
 no shutdown
!
end
