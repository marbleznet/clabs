! =====================================================================
!  R2  |  OSPF neighbor + traffic destination. Lo1 (172.16.2.0/24) is the
!  "server subnet" LAN hosts reach THROUGH R1, generating flows for NetFlow.
!  Minimal config only: interfaces + IPs. NO OSPF -- you add it. See README.
! =====================================================================
hostname r2
!
ip cef
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
! ---- Destination subnet (reached via R1) ----
interface Loopback1
 description ## traffic destination ##
 ip address 172.16.2.1 255.255.255.0
!
! ---- To R1 (OSPF) ----
interface Ethernet0/1
 description ## OSPF -> R1 ##
 ip address 10.0.12.2 255.255.255.252
 no shutdown
!
end
