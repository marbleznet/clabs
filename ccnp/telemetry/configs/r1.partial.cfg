! =====================================================================
!  R1  |  Monitored router -- SNMP agent, syslog source, NetFlow exporter.
!  LAN gateway (10.0.0.0/24) + link to R2 (OSPF). Minimal config only:
!  interfaces + IPs. NO SNMP, NO logging config, NO NetFlow -- you add it.
!  See README.
! =====================================================================
hostname r1
!
ip cef
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
! ---- LAN (to SW1: nms collector + host1) ----
interface Ethernet0/1
 description ## LAN -> SW1 (nms + host1) ##
 ip address 10.0.0.1 255.255.255.0
 no shutdown
!
! ---- To R2 (OSPF; traffic path for NetFlow) ----
interface Ethernet0/2
 description ## OSPF -> R2 ##
 ip address 10.0.12.1 255.255.255.252
 no shutdown
!
end
