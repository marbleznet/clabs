! =====================================================================
!  R2  |  DHCP relay + LAN-B gateway.
!  LAN-B clients broadcast; R2 relays their requests to the server (R1). You
!  add `ip helper-address` / `ipv6 dhcp relay` in the guide. Minimal config:
!  interfaces + IPs + ipv6 routing (base infra). NO relay config. See README.
! =====================================================================
hostname r2
!
ip cef
ipv6 unicast-routing
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
! ---- Transit to R1 (server) ----
interface Ethernet0/1
 description ## transit -> R1 ##
 ip address 10.0.12.2 255.255.255.252
 ipv6 address 2001:DB8:12::2/64
 no shutdown
!
! ---- LAN-B (relayed DHCP clients: pc2, r3) ----
interface Ethernet0/2
 description ## LAN-B (relayed) ##
 ip address 10.0.2.1 255.255.255.0
 ipv6 address 2001:DB8:2::1/64
 no shutdown
!
end
