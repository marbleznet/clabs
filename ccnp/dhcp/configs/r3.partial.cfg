! =====================================================================
!  R3  |  IOS DHCP CLIENT on LAN-B.
!  Its interface has NO static address -- in the guide you configure
!  `ip address dhcp` / `ipv6 address dhcp` so it leases from the server via
!  the R2 relay, demonstrating the IOS device-as-DHCP-client role. See README.
! =====================================================================
hostname r3
!
ip cef
ipv6 unicast-routing
!
! ---- LAN-B: leased via DHCP (you add 'ip address dhcp') ----
interface Ethernet0/1
 description ## LAN-B -- IOS DHCP client (no static address) ##
 no shutdown
!
end
