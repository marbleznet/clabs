! =====================================================================
!  R1  |  IOS DHCP server (v4 + v6) + LAN-A gateway.
!  Directly serves LAN-A (10.0.1.0/24); serves LAN-B (10.0.2.0/24) via the
!  relay on R2. Minimal config: interfaces + IPs + ipv6 routing (base infra).
!  NO DHCP config -- you build every pool. See README.
! =====================================================================
hostname r1
!
ip cef
ipv6 unicast-routing
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
! ---- LAN-A (direct DHCP clients: pc1) ----
interface Ethernet0/1
 description ## LAN-A (direct) ##
 ip address 10.0.1.1 255.255.255.0
 ipv6 address 2001:DB8:1::1/64
 no shutdown
!
! ---- Transit to R2 (relay) ----
interface Ethernet0/2
 description ## transit -> R2 ##
 ip address 10.0.12.1 255.255.255.252
 ipv6 address 2001:DB8:12::1/64
 no shutdown
!
end
