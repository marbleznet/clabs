! =====================================================================
!  R1  |  Core router on the shared LAN; R4's PRIMARY (successor) path
!  Minimal config only: interfaces + IPs. NO EIGRP -- you add that.
! =====================================================================
hostname r1
!
ip cef
!
! ---- Loopback0: stable EIGRP Router-ID / management ----
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
! ---- Core LAN (to SW1, shared with R2 & R3) ----
interface Ethernet0/1
 description ## Core LAN -> SW1 ##
 ip address 10.0.0.1 255.255.255.0
 ipv6 address 2001:DB8:0::1/64
 no shutdown
!
! ---- Point-to-point to R4 (R4's primary uplink) ----
interface Ethernet0/2
 description ## p2p -> R4 ##
 ip address 10.0.14.1 255.255.255.252
 ipv6 address 2001:DB8:14::1/64
 no shutdown
!
end
