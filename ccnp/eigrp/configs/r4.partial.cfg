! =====================================================================
!  R4  |  Dual-homed edge router (to R1 and R2) -- DUAL playground
!  Minimal config only: interfaces + IPs. NO EIGRP -- you add that.
!  Two uplinks into the core give R4 a successor AND a feasible
!  successor, so this is where you'll watch DUAL do its thing.
! =====================================================================
hostname r4
!
ip cef
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
!
! ---- Edge LAN (advertise into EIGRP) ----
interface Loopback1
 description ## Edge net ##
 ip address 172.16.40.1 255.255.255.0
 ipv6 address 2001:DB8:40::1/64
!
! ---- Primary uplink to R1 ----
interface Ethernet0/1
 description ## p2p -> R1 (primary) ##
 ip address 10.0.14.2 255.255.255.252
 ipv6 address 2001:DB8:14::4/64
 no shutdown
!
! ---- Backup uplink to R2 ----
interface Ethernet0/2
 description ## p2p -> R2 (backup) ##
 ip address 10.0.24.2 255.255.255.252
 ipv6 address 2001:DB8:24::4/64
 no shutdown
!
end
