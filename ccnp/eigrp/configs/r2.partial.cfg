! =====================================================================
!  R2  |  Core router on the shared LAN; R4's BACKUP (feasible successor)
!  Minimal config only: interfaces + IPs. NO EIGRP -- you add that.
! =====================================================================
hostname r2
!
ip cef
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
! ---- Core LAN (to SW1, shared with R1 & R3) ----
interface Ethernet0/1
 description ## Core LAN -> SW1 ##
 ip address 10.0.0.2 255.255.255.0
 ipv6 address 2001:DB8:0::2/64
 no shutdown
!
! ---- Point-to-point to R4 (R4's backup uplink) ----
interface Ethernet0/2
 description ## p2p -> R4 ##
 ip address 10.0.24.1 255.255.255.252
 ipv6 address 2001:DB8:24::2/64
 no shutdown
!
end
