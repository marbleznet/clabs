! =====================================================================
!  R5  |  Single-homed edge behind R3 -- EIGRP STUB / query boundary
!  Minimal config only: interfaces + IPs. NO EIGRP -- you add that.
! =====================================================================
hostname r5
!
ip cef
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
!
! ---- Edge LAN (advertise into EIGRP) ----
interface Loopback1
 description ## Edge net ##
 ip address 172.16.50.1 255.255.255.0
 ipv6 address 2001:DB8:50::1/64
!
! ---- Single uplink to R3 ----
interface Ethernet0/1
 description ## p2p -> R3 ##
 ip address 10.0.35.2 255.255.255.252
 ipv6 address 2001:DB8:35::5/64
 no shutdown
!
end
