! =====================================================================
!  R3  |  Core router on the shared LAN; gateway to the stub (R5)
!  Minimal config only: interfaces + IPs. NO EIGRP, NO redistribution.
!  Lo1 represents a "connected" external network you will redistribute
!  and/or summarize in the guide.
! =====================================================================
hostname r3
!
ip cef
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
! ---- Simulated EXTERNAL network (NOT in EIGRP; redistribute as connected) ----
interface Loopback1
 description ## External net -> redistribute into EIGRP ##
 ip address 172.16.30.1 255.255.255.0
 ipv6 address 2001:DB8:30::1/64
!
! ---- Core LAN (to SW1, shared with R1 & R2) ----
interface Ethernet0/1
 description ## Core LAN -> SW1 ##
 ip address 10.0.0.3 255.255.255.0
 ipv6 address 2001:DB8:0::3/64
 no shutdown
!
! ---- Point-to-point to the stub router R5 ----
interface Ethernet0/2
 description ## p2p -> R5 (stub) ##
 ip address 10.0.35.1 255.255.255.252
 ipv6 address 2001:DB8:35::3/64
 no shutdown
!
end
