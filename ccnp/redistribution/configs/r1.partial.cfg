! =====================================================================
!  R1  |  OSPF-domain core. Originates the 192.168.x networks + a block
!  (192.168.16-19.0/24) you will summarize to 192.168.16.0/22.
!  Minimal config only: interfaces + IPs. NO OSPF -- you add it. See README.
! =====================================================================
hostname r1
!
ip cef
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
! ---- OSPF-internal networks ----
interface Loopback1
 description ## OSPF net ##
 ip address 192.168.1.1 255.255.255.0
!
! ---- Summary block: 192.168.16.0/24 .. 192.168.19.0/24  (-> /22) ----
interface Loopback11
 ip address 192.168.16.1 255.255.255.0
interface Loopback12
 ip address 192.168.17.1 255.255.255.0
interface Loopback13
 ip address 192.168.18.1 255.255.255.0
interface Loopback14
 ip address 192.168.19.1 255.255.255.0
!
! ---- To R2 (OSPF boundary #1) ----
interface Ethernet0/1
 description ## OSPF -> R2 ##
 ip address 10.12.0.1 255.255.255.252
 no shutdown
!
! ---- To R3 (OSPF boundary #2) ----
interface Ethernet0/2
 description ## OSPF -> R3 ##
 ip address 10.13.0.1 255.255.255.252
 no shutdown
!
! ---- To R5 (OSPF edge / static source) ----
interface Ethernet0/3
 description ## OSPF -> R5 ##
 ip address 10.15.0.1 255.255.255.252
 no shutdown
!
end
