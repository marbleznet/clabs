! =====================================================================
!  R4  |  EIGRP-domain core. Originates the 172.16.x networks + a block
!  (172.16.20-23.0/24) you will summarize to 172.16.20.0/22.
!  Minimal config only: interfaces + IPs. NO EIGRP -- you add it. See README.
! =====================================================================
hostname r4
!
ip cef
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
!
! ---- EIGRP-internal networks ----
interface Loopback1
 description ## EIGRP net ##
 ip address 172.16.4.1 255.255.255.0
!
! ---- Summary block: 172.16.20.0/24 .. 172.16.23.0/24  (-> /22) ----
interface Loopback11
 ip address 172.16.20.1 255.255.255.0
interface Loopback12
 ip address 172.16.21.1 255.255.255.0
interface Loopback13
 ip address 172.16.22.1 255.255.255.0
interface Loopback14
 ip address 172.16.23.1 255.255.255.0
!
! ---- To R2 (EIGRP boundary #1) ----
interface Ethernet0/1
 description ## EIGRP -> R2 ##
 ip address 10.24.0.2 255.255.255.252
 no shutdown
!
! ---- To R3 (EIGRP boundary #2) ----
interface Ethernet0/2
 description ## EIGRP -> R3 ##
 ip address 10.34.0.2 255.255.255.252
 no shutdown
!
end
