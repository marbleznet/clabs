! =====================================================================
!  R5  |  OSPF edge -- also a STATIC route source (a non-dynamic routing
!  source you redistribute). You'll add the static routes in the guide.
!  Minimal config only: interfaces + IPs. NO OSPF -- you add it. See README.
! =====================================================================
hostname r5
!
ip cef
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
!
! ---- OSPF-internal network ----
interface Loopback1
 description ## OSPF net ##
 ip address 192.168.5.1 255.255.255.0
!
! ---- To R1 (OSPF) ----
interface Ethernet0/1
 description ## OSPF -> R1 ##
 ip address 10.15.0.2 255.255.255.252
 no shutdown
!
end
