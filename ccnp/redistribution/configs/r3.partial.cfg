! =====================================================================
!  R3  |  Boundary router #2 -- OSPF (e0/1) + EIGRP (e0/2).
!  The SECOND redistribution point -- this is what creates the loop/feedback
!  problems you'll fix with tags, AD, and filters.
!  Minimal config only: interfaces + IPs. NO routing -- you add it. See README.
! =====================================================================
hostname r3
!
ip cef
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
! ---- OSPF side (to R1) ----
interface Ethernet0/1
 description ## OSPF -> R1 ##
 ip address 10.13.0.2 255.255.255.252
 no shutdown
!
! ---- EIGRP side (to R4) ----
interface Ethernet0/2
 description ## EIGRP -> R4 ##
 ip address 10.34.0.1 255.255.255.252
 no shutdown
!
end
