! =====================================================================
!  R2  |  Boundary router #1 -- OSPF (e0/1) + EIGRP (e0/2).
!  You will run BOTH protocols here and mutually redistribute between them.
!  Minimal config only: interfaces + IPs. NO routing -- you add it. See README.
! =====================================================================
hostname r2
!
ip cef
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
! ---- OSPF side (to R1) ----
interface Ethernet0/1
 description ## OSPF -> R1 ##
 ip address 10.12.0.2 255.255.255.252
 no shutdown
!
! ---- EIGRP side (to R4) ----
interface Ethernet0/2
 description ## EIGRP -> R4 ##
 ip address 10.24.0.1 255.255.255.252
 no shutdown
!
end
